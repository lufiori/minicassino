<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link rel="manifest" href="manifest.json">
<title>Cassino</title>

<style>
body {
  margin: 0;
  font-family: Arial;
}

/* MENU */
.menu {
  display: flex;
  position: fixed;
  top: 0;
  width: 100%;
  z-index: 999;
}

.menu button {
  flex: 1;
  padding: 20px;
  font-size: 30px;
  border: none;
  background: #222;
  color: white;
}

.ativo {
  background: gold;
  color: black;
}

/* TELAS */
.tela {
  display: none;
}

.ativa {
  display: block;
  margin-top: 80px;
}

/* -------- TOP CARD -------- */
#top {
  background: #f5f5f5;
  text-align: center;
  padding-bottom: 260px;
}

.forma {
  width: 380px;
  height: 380px;
  margin: 40px auto;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 300px;
  color: white;
  border-radius: 40px;
}

.par { background: blue; }
.impar { background: green; }

/* -------- ROLETA -------- */
#roleta {
  background: radial-gradient(circle, #0b3d2e, #06251c);
  color: white;
  text-align: center;
  padding-bottom: 260px;
}

.bola {
  width: 500px;
  height: 500px;
  border-radius: 50%;
  margin: 40px auto;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 220px;
}

.vermelho { background: red; }
.preto { background: black; border: 2px solid white; }

/* BOTÃO */
.btn {
  position: fixed;
  bottom: 0;
  width: 100%;
  height: 250px;
  font-size: 60px;
  border: none;
}

#btnTopSort { background: #333; color: white; }
#btnRoleta { background: gold; }

/* TEMPO */
.tempo {
  font-size: 40px;
}
</style>
</head>

<body>

<div class="menu">
  <button id="menuTop" class="ativo" onclick="trocar('top')">🃏 Top Card</button>
  <button id="menuRoleta" onclick="trocar('roleta')">🎡 Roleta</button>
</div>

<!-- TOP CARD -->
<div id="top" class="tela ativa">
  <div id="forma" class="forma">-</div>
  <div class="tempo" id="tempoTop">00:00</div>
  <button id="btnTopSort" class="btn">SORTear</button>
</div>

<!-- ROLETA -->
<div id="roleta" class="tela">
  <div id="bola" class="bola">-</div>
  <div class="tempo" id="tempoRoleta">00:00</div>
  <button id="btnRoleta" class="btn">GIRAR 🎰</button>
</div>

<script>
function trocar(t){
  document.querySelectorAll(".tela").forEach(e=>e.classList.remove("ativa"));
  document.getElementById(t).classList.add("ativa");

  menuTop.classList.toggle("ativo", t==="top");
  menuRoleta.classList.toggle("ativo", t==="roleta");
}

/* TOP CARD */
btnTopSort.onclick = () => {
  let n = Math.floor(Math.random()*36)+1;
  forma.innerText = n;
  forma.className = "forma " + (n%2?"impar":"par");
};

/* ROLETA */
btnRoleta.onclick = () => {
  let n = Math.floor(Math.random()*36)+1;
  bola.innerText = n;
  bola.className = "bola " + ([1,3,5,7,9,12,14,16,18,19,21,23,25,27,30,32,34,36].includes(n)?"vermelho":"preto");
};

/* SERVICE WORKER */
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>

</body>
</html>
