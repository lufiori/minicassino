<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <link rel="manifest" href="manifest.json">
<meta charset="UTF-8">
<title>Cassino</title>

<style>
body {
  margin: 0;
  font-family: Arial;
}

/* MENU */
.menu {
  display: flex;
  position: fixed;
  top: 0;
  width: 100%;
  z-index: 999;
}

.menu button {
  flex: 1;
  padding: 20px;
  font-size: 30px;
  border: none;
  background: #222;
  color: white;
}

.ativo {
  background: gold;
  color: black;
}

/* IFRAME */
iframe {
  width: 100%;
  height: calc(100vh - 70px);
  border: none;
  margin-top: 70px;
}
</style>
</head>

<body>

<div class="menu">
  <button id="btnTop" class="ativo" onclick="trocar('top')">🃏 Top Card</button>
  <button id="btnRoleta" onclick="trocar('roleta')">🎡 Roleta</button>
</div>

<iframe id="frame" src="topcard.html"></iframe>

<script>
function trocar(jogo) {
  const frame = document.getElementById("frame");

  if (jogo === "top") {
    frame.src = "topcard.html";
    btnTop.classList.add("ativo");
    btnRoleta.classList.remove("ativo");
  } else {
    frame.src = "roleta.html";
    btnRoleta.classList.add("ativo");
    btnTop.classList.remove("ativo");
  }
}

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>


  
</script>

</body>
</html>
