<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Cassino</title>

<style>
body {
  margin: 0;
}

/* MENU */
.menu {
  display: flex;
  position: fixed;
  top: 0;
  width: 100%;
  z-index: 999;
}

.menu button {
  flex: 1;
  padding: 20px;
  font-size: 30px;
  border: none;
}

.ativo {
  background: gold;
}

/* TELAS */
.tela {
  display: none;
}

.ativa {
  display: block;
  margin-top: 80px;
}
</style>
</head>

<body>

<div class="menu">
  <button id="btnTop" class="ativo" onclick="trocar('top')">🃏 Top Card</button>
  <button id="btnRoleta" onclick="trocar('roleta')">🎡 Roleta</button>
</div>

<!-- ================= TOP CARD ================= -->
<div id="top" class="tela ativa">

<!-- COLE AQUI SEU HTML DO TOP CARD (SÓ O BODY, SEM <html> E <head>) -->

</div>

<!-- ================= ROLETA ================= -->
<div id="roleta" class="tela">

<!-- COLE AQUI SEU HTML DA ROLETA (SÓ O BODY, SEM <html> E <head>) -->

</div>

<script>
function trocar(tela){
  document.getElementById("top").classList.remove("ativa");
  document.getElementById("roleta").classList.remove("ativa");

  document.getElementById("btnTop").classList.remove("ativo");
  document.getElementById("btnRoleta").classList.remove("ativo");

  document.getElementById(tela).classList.add("ativa");

  if(tela==="top"){
    document.getElementById("btnTop").classList.add("ativo");
  } else {
    document.getElementById("btnRoleta").classList.add("ativo");
  }
}
</script>

</body>
</html>
